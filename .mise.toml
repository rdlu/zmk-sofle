[tools]
python = {version = "3.12", backend = "uv"}
"pipx:weasyprint" = "latest"

[env]
_.python.venv = {path = ".venv", create = true}

[tasks.setup]
description = "Initialize west workspace and Python deps (run once after cloning)"
run = """
west init -l config/
west update
west zephyr-export
uv pip install -r zmk/zephyr/scripts/requirements.txt
# ZMK Studio protobuf codegen needs pkg_resources (dropped in setuptools 81)
# and google.protobuf (nanopb generator). Neither is in Zephyr's requirements.
uv pip install 'setuptools<81' protobuf
"""

[tasks.build-left]
description = "Build left half firmware (ZMK Studio enabled)"
run = """
west build -s zmk/app -b eyelash_sofle_left --pristine -- \
  -DZMK_CONFIG="$(pwd)/config" \
  -DSHIELD=nice_view \
  -DCONFIG_ZMK_STUDIO=y \
  -DCONFIG_ZMK_STUDIO_LOCKING=n \
  -Dsnippet=studio-rpc-usb-uart
cp build/zephyr/zmk.uf2 eyelash_sofle_left.uf2
"""

[tasks.build-right]
description = "Build right half firmware"
run = """
west build -s zmk/app -b eyelash_sofle_right --pristine -- \
  -DZMK_CONFIG="$(pwd)/config" \
  -DSHIELD=nice_view
cp build/zephyr/zmk.uf2 eyelash_sofle_right.uf2
"""

[tasks.build-reset]
description = "Build settings reset firmware (clears Bluetooth bonds)"
run = """
west build -s zmk/app -b nice_nano_v2 --pristine -- \
  -DZMK_CONFIG="$(pwd)/config" \
  -DSHIELD=settings_reset
cp build/zephyr/zmk.uf2 settings_reset.uf2
"""

[tasks.flash-left]
description = "Flash locally-built left half — waits up to 60s for NICENANO mount"
run = """
set -euo pipefail
MOUNT="/run/media/$USER/NICENANO"
UF2="eyelash_sofle_left.uf2"
[ -f "$UF2" ] || { echo "ERROR: $UF2 not found — run 'mise run build-left' first"; exit 1; }
echo ">> Double-tap RESET on the LEFT half now"
for _ in $(seq 1 60); do [ -d "$MOUNT" ] && break; sleep 1; done
[ -d "$MOUNT" ] || { echo "ERROR: NICENANO not detected within 60s"; exit 1; }
sleep 1
cp "$UF2" "$MOUNT/"
sync
echo "✅ Left half flashed."
"""

[tasks.flash-right]
description = "Flash locally-built right half — waits up to 60s for NICENANO mount"
run = """
set -euo pipefail
MOUNT="/run/media/$USER/NICENANO"
UF2="eyelash_sofle_right.uf2"
[ -f "$UF2" ] || { echo "ERROR: $UF2 not found — run 'mise run build-right' first"; exit 1; }
echo ">> Double-tap RESET on the RIGHT half now"
for _ in $(seq 1 60); do [ -d "$MOUNT" ] && break; sleep 1; done
[ -d "$MOUNT" ] || { echo "ERROR: NICENANO not detected within 60s"; exit 1; }
sleep 1
cp "$UF2" "$MOUNT/"
sync
echo "✅ Right half flashed."
"""

[tasks.flash-reset]
description = "Flash locally-built settings_reset — waits up to 60s for NICENANO mount"
run = """
set -euo pipefail
MOUNT="/run/media/$USER/NICENANO"
UF2="settings_reset.uf2"
[ -f "$UF2" ] || { echo "ERROR: $UF2 not found — run 'mise run build-reset' first"; exit 1; }
echo ">> Double-tap RESET on the half to clear now"
for _ in $(seq 1 60); do [ -d "$MOUNT" ] && break; sleep 1; done
[ -d "$MOUNT" ] || { echo "ERROR: NICENANO not detected within 60s"; exit 1; }
sleep 1
cp "$UF2" "$MOUNT/"
sync
echo "✅ settings_reset flashed. Now flash the normal firmware on top."
"""

[tasks.build-flash]
description = "Build both halves locally, flash interactively, print memory budget at end"
run = """
set -euo pipefail

MOUNT="/run/media/$USER/NICENANO"
LEFT_UF2="eyelash_sofle_left.uf2"
RIGHT_UF2="eyelash_sofle_right.uf2"
LEFT_LOG=$(mktemp)
RIGHT_LOG=$(mktemp)
trap 'rm -f "$LEFT_LOG" "$RIGHT_LOG"' EXIT

echo ">> Building LEFT half..."
mise run build-left 2>&1 | tee "$LEFT_LOG"

echo ""
echo ">> Building RIGHT half..."
mise run build-right 2>&1 | tee "$RIGHT_LOG"

[ -f "$LEFT_UF2" ]  || { echo "ERROR: $LEFT_UF2 missing after build";  exit 1; }
[ -f "$RIGHT_UF2" ] || { echo "ERROR: $RIGHT_UF2 missing after build"; exit 1; }

wait_for_mount() {
  local label="$1"
  echo ""
  echo "==============================================="
  echo ">> Double-tap RESET on the $label half now"
  echo "==============================================="
  for _ in $(seq 1 60); do
    if [ -d "$MOUNT" ]; then
      sleep 1  # give udisks a moment to finish mounting
      return 0
    fi
    sleep 1
  done
  echo "ERROR: NICENANO not detected within 60s"
  return 1
}

wait_for_unmount() {
  for _ in $(seq 1 30); do
    [ ! -d "$MOUNT" ] && return 0
    sleep 1
  done
}

wait_for_mount "LEFT"
echo ">> Flashing left..."
cp "$LEFT_UF2" "$MOUNT/"
sync
echo ">> Left flashed. Waiting for device to reset..."
wait_for_unmount

wait_for_mount "RIGHT"
echo ">> Flashing right..."
cp "$RIGHT_UF2" "$MOUNT/"
sync
echo ">> Right flashed."

# Print memory budget summary captured from the build logs
print_budget() {
  local label="$1" log="$2"
  echo "  $label:"
  awk '/^Memory region/{flag=1; next} flag && /^[ ]*FLASH:|^[ ]*RAM:/{print "    " $0} flag && /^[ ]*IDT_LIST:/{flag=0}' "$log"
}

echo ""
echo "==============================================="
echo "  Firmware memory budget"
echo "==============================================="
print_budget "Left  (Studio + nice_view)" "$LEFT_LOG"
print_budget "Right (nice_view)         " "$RIGHT_LOG"
echo ""
echo "✅ Both halves built and flashed. They will auto-reset and re-pair over BT."
"""

[tasks.draw]
description = "Regenerate keymap SVG locally using keymap-drawer"
run = """
uvx --from keymap-drawer keymap parse -z config/eyelash_sofle.keymap -o keymap-drawer/eyelash_sofle.yaml
uvx --from keymap-drawer keymap -c keymap_drawer.config.yaml draw -z eyelash_sofle keymap-drawer/eyelash_sofle.yaml -o keymap-drawer/eyelash_sofle.svg
echo "SVG written to keymap-drawer/eyelash_sofle.svg"
"""

[tasks.flash-release]
description = "Download latest main firmware from GH Actions and flash BOTH halves interactively"
run = """
set -euo pipefail

REPO="rdlu/zmk-sofle"
MOUNT="/run/media/$USER/NICENANO"
WORK=$(mktemp -d)
trap 'rm -rf "$WORK"' EXIT

echo ">> Fetching latest successful main build from GitHub Actions..."
RUN_ID=$(gh run list --repo "$REPO" --workflow "Build ZMK firmware" --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId')
if [ -z "$RUN_ID" ]; then
  echo "ERROR: no successful main build found on $REPO"
  exit 1
fi
echo "   run $RUN_ID"

gh run download "$RUN_ID" --repo "$REPO" --dir "$WORK" >/dev/null

# Upstream ZMK workflow names artifacts inconsistently. Rename to canonical
# filenames so local and release flows use the same names everywhere.
GH_LEFT="$WORK/firmware/eyelash_sofle_studio_left.uf2"
GH_RIGHT="$WORK/firmware/nice_view-eyelash_sofle_right-zmk.uf2"
LEFT_UF2="$WORK/firmware/eyelash_sofle_left.uf2"
RIGHT_UF2="$WORK/firmware/eyelash_sofle_right.uf2"

for f in "$GH_LEFT" "$GH_RIGHT"; do
  if [ ! -f "$f" ]; then
    echo "ERROR: expected artifact missing: $f"
    exit 1
  fi
done

mv "$GH_LEFT" "$LEFT_UF2"
mv "$GH_RIGHT" "$RIGHT_UF2"

wait_for_mount() {
  local label="$1"
  echo ""
  echo "==============================================="
  echo ">> Double-tap RESET on the $label half now"
  echo "==============================================="
  for _ in $(seq 1 60); do
    if [ -d "$MOUNT" ]; then
      sleep 1  # give udisks a moment to finish mounting
      return 0
    fi
    sleep 1
  done
  echo "ERROR: NICENANO not detected within 60s"
  return 1
}

wait_for_unmount() {
  for _ in $(seq 1 30); do
    [ ! -d "$MOUNT" ] && return 0
    sleep 1
  done
}

# LEFT
wait_for_mount "LEFT"
echo ">> Flashing left..."
cp "$LEFT_UF2" "$MOUNT/"
sync
echo ">> Left flashed. Waiting for device to reset..."
wait_for_unmount

# RIGHT
wait_for_mount "RIGHT"
echo ">> Flashing right..."
cp "$RIGHT_UF2" "$MOUNT/"
sync
echo ">> Right flashed."

echo ""
echo "✅ Both halves flashed. They will auto-reset and re-pair over BT."
"""

[tasks.flash-release-reset]
description = "Download latest main firmware and flash settings_reset on whichever half is mounted"
run = """
set -euo pipefail

REPO="rdlu/zmk-sofle"
MOUNT="/run/media/$USER/NICENANO"
WORK=$(mktemp -d)
trap 'rm -rf "$WORK"' EXIT

echo ">> Fetching latest successful main build..."
RUN_ID=$(gh run list --repo "$REPO" --workflow "Build ZMK firmware" --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId')
gh run download "$RUN_ID" --repo "$REPO" --dir "$WORK" >/dev/null

GH_RESET="$WORK/firmware/settings_reset-nice_nano_v2-zmk.uf2"
RESET_UF2="$WORK/firmware/settings_reset.uf2"
[ -f "$GH_RESET" ] || { echo "ERROR: $GH_RESET missing"; exit 1; }
mv "$GH_RESET" "$RESET_UF2"

echo ""
echo "==============================================="
echo ">> Double-tap RESET on the half to clear now"
echo "==============================================="
for _ in $(seq 1 60); do
  [ -d "$MOUNT" ] && break
  sleep 1
done
[ -d "$MOUNT" ] || { echo "ERROR: NICENANO not detected"; exit 1; }
sleep 1

cp "$RESET_UF2" "$MOUNT/"
sync
echo "✅ settings_reset flashed. Now flash the normal firmware on top."
"""

[tasks.draw-pdf]
description = "Convert the existing local SVG (keymap-drawer/eyelash_sofle.svg) to a printable A4 PDF"
run = """
set -euo pipefail
SVG_FILE="keymap-drawer/eyelash_sofle.svg"
PDF="keymap-drawer/eyelash_sofle.pdf"
[ -f "$SVG_FILE" ] || { echo "ERROR: $SVG_FILE not found. Run 'mise run draw' (local) or 'mise run draw-pdf-ci' (CI version) first."; exit 1; }
command -v weasyprint >/dev/null || { echo "ERROR: weasyprint not found. Run 'mise install' to provision the pipx:weasyprint tool from .mise.toml."; exit 1; }

VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo dev)
DATE=$(date -I)  # ISO 8601 — YYYY-MM-DD
SVG_ABS=$(realpath "$SVG_FILE")
TMP_HTML=$(mktemp --suffix=.html)
trap 'rm -f "$TMP_HTML"' EXIT

cat > "$TMP_HTML" <<'HTML_EOF'
<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  @page {
    size: A4;
    margin: 1.6cm 1.4cm 1.7cm 1.4cm;
    @top-center {
      content: "Eyelash Sofle — Keymap Layout · @@VERSION@@";
      font: 600 11pt sans-serif;
      padding-bottom: 6pt;
      border-bottom: 0.5pt solid #999;
      vertical-align: bottom;
    }
    @bottom-center {
      content: "Generated @@DATE@@ · github.com/rdlu/zmk-sofle · Page " counter(page) " / " counter(pages);
      font: 9pt sans-serif;
      color: #666;
      padding-top: 6pt;
      border-top: 0.5pt solid #ccc;
      vertical-align: top;
    }
  }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  img { max-width: 100%; max-height: 100%; object-fit: contain; }
</style></head>
<body><img src="@@SVG@@" alt="Eyelash Sofle keymap"></body></html>
HTML_EOF

sed -i "s|@@VERSION@@|$VERSION|g; s|@@DATE@@|$DATE|g; s|@@SVG@@|file://$SVG_ABS|g" "$TMP_HTML"
weasyprint "$TMP_HTML" "$PDF"
echo "PDF written to $PDF (source: $SVG_FILE, version: $VERSION, date: $DATE)"
"""

[tasks.draw-pdf-fresh]
description = "Regenerate the SVG locally (mise run draw) and then build the PDF"
depends = ["draw"]
run = "mise run draw-pdf"

[tasks.draw-pdf-ci]
description = "Fetch the CI-rendered SVG from origin/main and build the PDF (no local regen)"
run = """
set -euo pipefail
command -v git >/dev/null || { echo "ERROR: git not found."; exit 1; }
echo ">> Fetching latest origin/main..."
git fetch origin main --quiet || { echo "ERROR: failed to fetch origin/main (no network or remote unreachable?)"; exit 1; }
git show origin/main:keymap-drawer/eyelash_sofle.svg > keymap-drawer/.eyelash_sofle.ci.svg || {
  rm -f keymap-drawer/.eyelash_sofle.ci.svg
  echo "ERROR: keymap-drawer/eyelash_sofle.svg not found on origin/main."
  exit 1
}
# Swap the local SVG with the CI version for this generation, then restore.
mv keymap-drawer/eyelash_sofle.svg keymap-drawer/.eyelash_sofle.local.svg.bak
mv keymap-drawer/.eyelash_sofle.ci.svg keymap-drawer/eyelash_sofle.svg
trap 'mv -f keymap-drawer/.eyelash_sofle.local.svg.bak keymap-drawer/eyelash_sofle.svg 2>/dev/null || true' EXIT
mise run draw-pdf
echo ">> PDF built from CI-rendered SVG (origin/main)."
"""

[tasks.open-pdf]
description = "Generate the PDF from the current local SVG and open it in the default viewer"
depends = ["draw-pdf"]
run = """
set -euo pipefail
PDF="keymap-drawer/eyelash_sofle.pdf"
command -v xdg-open >/dev/null || { echo "ERROR: xdg-open not found. Install xdg-utils or open $PDF manually."; exit 1; }
[ -f "$PDF" ] || { echo "ERROR: $PDF missing — generation failed."; exit 1; }
xdg-open "$PDF"
"""
